<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manglish Typing - Malayalam Transliteration</title>
    
    <!-- Google Fonts: Arima for Malayalam and Poppins for English -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arima:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #6c63ff;
            --secondary-color: #4834d4;
            --light-bg: #f5f7ff;
            --dark-text: #2c3e50;
            --light-text: #7f8c8d;
            --border-color: #dfe6e9;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--light-bg);
            color: var(--dark-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .app-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2rem 0;
        }
        
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .malayalam-title {
            font-family: 'Arima', sans-serif;
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        }
        
        .english-subtitle {
            font-size: 1.5rem;
            font-weight: 300;
            color: var(--secondary-color);
            margin-bottom: 1rem;
        }
        
        .description {
            font-size: 1.1rem;
            color: var(--light-text);
            max-width: 600px;
            margin: 0 auto 2rem;
        }
        
        .typing-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 2rem;
            margin: 0 auto;
            max-width: 800px;
            transition: transform 0.3s;
        }
        
        .typing-card:hover {
            transform: translateY(-5px);
        }
        
        .typing-area-container {
            position: relative;
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            font-weight: 500;
            margin-bottom: 0.75rem;
            color: var(--dark-text);
            font-size: 1.1rem;
        }
        
        .form-control {
            border: 2px solid var(--border-color);
            border-radius: 15px;
            padding: 1.5rem;
            font-size: 1.3rem;
            transition: all 0.3s;
            font-family: 'Arima', sans-serif;
            min-height: 200px;
            resize: vertical;
            background-color: #fdfdfd;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }
        
        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25rem rgba(108, 99, 255, 0.2), inset 0 1px 3px rgba(0,0,0,0.05);
            background-color: #fff;
        }
        
        .typing-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
        }
        
        .typing-actions .btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
            border-radius: 50px;
            padding: 0.5rem 1.2rem;
            transition: all 0.3s;
        }
        
        .btn-clear {
            background-color: #f8f9fa;
            color: var(--dark-text);
            border: 1px solid #dee2e6;
        }
        
        .btn-clear:hover {
            background-color: #e9ecef;
            color: var(--dark-text);
            border-color: #adb5bd;
        }
        
        .btn-copy {
            background-color: var(--primary-color);
            color: white;
            border: none;
        }
        
        .btn-copy:hover {
            background-color: var(--secondary-color);
            color: white;
        }
        
        .character-count {
            font-size: 0.9rem;
            color: var(--light-text);
            display: flex;
            align-items: center;
        }
        .status {
            height: 24px;
            margin-top: 0.75rem;
            font-size: 0.9rem;
            color: var(--light-text);
            display: flex;
            align-items: center;
        }
        
        .status i {
            margin-right: 0.5rem;
        }
        
        .footer {
            background-color: var(--dark-text);
            color: white;
            padding: 1.5rem 0;
            margin-top: auto;
        }
        
        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .footer-brand {
            font-size: 1.1rem;
            font-weight: 500;
        }
        
        .footer-brand i {
            color: #e74c3c;
            margin: 0 0.3rem;
        }
        
        .footer-links {
            display: flex;
            gap: 1.5rem;
        }
        
        .footer-links a {
            color: #bdc3c7;
            text-decoration: none;
            transition: color 0.3s;
            font-weight: 500;
        }
        
        .footer-links a:hover {
            color: white;
        }
        
        .footer-links i {
            margin-right: 0.5rem;
        }
        
        .typing-keyboard {
            position: absolute;
            bottom: 10px;
            right: 15px;
            color: var(--light-text);
            font-size: 1.2rem;
            opacity: 0.7;
            pointer-events: none;
        }
        
        @media (max-width: 768px) {
            .malayalam-title {
                font-size: 2.5rem;
            }
            
            .english-subtitle {
                font-size: 1.2rem;
            }
            
            .typing-card {
                padding: 1.5rem;
            }
            
            .form-control {
                font-size: 1.1rem;
                min-height: 150px;
            }
            
            .typing-actions {
                flex-direction: column;
                gap: 0.8rem;
                align-items: stretch;
            }
            
            .typing-actions .btn {
                justify-content: center;
            }
            
            .footer-content {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="container">
            <div class="header">
                <h1 class="malayalam-title">മംഗ്ലീഷ് ടൈപ്പിങ്ങ്</h1>
                <h2 class="english-subtitle">Manglish Typing</h2>
            </div>
            
            <div class="typing-card">
                <div class="mb-3">
                    <label for="manglish-input" class="form-label">
                        <i class="fas fa-keyboard me-2"></i>Type in Manglish
                    </label>
                    <div class="typing-area-container">
                        <textarea 
                            id="manglish-input" 
                            class="form-control" 
                            placeholder="ഇവിടെ ടൈപ്പ് ചെയ്യു.... (Type here...)"
                        ></textarea>
                        <div class="typing-keyboard">
                            <i class="fas fa-keyboard"></i>
                        </div>
                    </div>
                    
                    <div class="typing-actions">
                        <div class="character-count">
                            <i class="fas fa-file-alt me-1"></i>
                            <span id="char-count">0</span> characters
                        </div>
                        <div>
                            <button id="copy-btn" class="btn btn-copy">
                                <i class="fas fa-copy"></i> Copy
                            </button>
                        </div>
                    </div>
                    
                    <div id="status" class="status"></div>
                </div>
            </div>
        </div>
    </div>
    
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    Made with <i class="fas fa-heart"></i> by NajahCreates
                </div>
                <div class="footer-links">
                    <a href="https://github.com/najahcreates/manglish" target="_blank">
                        <i class="fab fa-github"></i>GitHub
                    </a>
                    <a href="https://najahcreates.netlify.app" target="_blank">
                        <i class="fas fa-globe"></i>Website
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        const textarea = document.getElementById('manglish-input');
        const status = document.getElementById('status');
        const clearBtn = document.getElementById('clear-btn');
        const copyBtn = document.getElementById('copy-btn');
        const charCount = document.getElementById('char-count');
        
        // Function to update character count
        function updateCharCount() {
            const count = textarea.value.length;
            charCount.textContent = count;
        }
        
        // Function to transliterate text using Google Input Tools API
        async function transliterate(text) {
            const params = new URLSearchParams({
                text: text,
                itc: "ml-t-i0-und",
                num: 5,
                cp: 0,
                cs: 1,
                ie: "utf-8",
                oe: "utf-8"
            });
            
            try {
                status.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Transliterating...';
                const response = await fetch("https://inputtools.google.com/request", {
                    method: "POST",
                    body: params,
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded"
                    }
                });
                
                const data = await response.json();
                
                if (data[0] === "SUCCESS") {
                    const suggestions = data[1][0][1];
                    status.innerHTML = '<i class="fas fa-check-circle text-success"></i> Success';
                    setTimeout(() => {
                        status.innerHTML = '';
                    }, 2000);
                    return suggestions[0]; // Return first suggestion
                } else {
                    status.innerHTML = '<i class="fas fa-exclamation-circle text-warning"></i> Transliteration failed';
                    return text;
                }
            } catch (error) {
                console.error("Error fetching data:", error);
                status.innerHTML = '<i class="fas fa-exclamation-triangle text-danger"></i> Network error';
                return text;
            }
        }
        
        // Handle keyup events
        textarea.addEventListener("keyup", async (event) => {
            // Update character count
            updateCharCount();
            
            // Only process on spacebar or when typing ends
            if (event.code === "Space" || event.code === "Enter") {
                const currentText = textarea.value;
                const words = currentText.trim().split(' ');
                const lastWord = words[words.length - 1];
                
                if (lastWord) {
                    const transliteratedWord = await transliterate(lastWord);
                    
                    // Replace the last word with transliterated version
                    words[words.length - 1] = transliteratedWord;
                    const newText = words.join(' ') + (event.code === "Space" ? ' ' : '');
                    
                    // Update textarea and move cursor to end
                    textarea.value = newText;
                    textarea.selectionStart = textarea.selectionEnd = newText.length;
                    
                    // Update character count after transliteration
                    updateCharCount();
                }
            }
        });
        
        // Clear button functionality
        clearBtn.addEventListener("click", () => {
            textarea.value = '';
            updateCharCount();
            textarea.focus();
        });
        
        // Copy button functionality
        copyBtn.addEventListener("click", () => {
            textarea.select();
            document.execCommand('copy');
            
            // Show success message
            status.innerHTML = '<i class="fas fa-check-circle text-success"></i> Copied to clipboard!';
            setTimeout(() => {
                status.innerHTML = '';
            }, 2000);
        });
        
        // Clear status when user starts typing again
        textarea.addEventListener("input", () => {
            if (status.textContent) {
                status.innerHTML = '';
            }
            updateCharCount();
        });
        
        // Focus on textarea when page loads
        window.addEventListener('load', () => {
            textarea.focus();
            updateCharCount();
        });
    </script>
</body>
</html>
